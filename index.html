<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Produtos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<aside class="sidebar">
<h2>Cadastro de Produtos</h2>

<button onclick="showPage('home')">Home</button>

<div id="guestMenu">
<button onclick="showPage('login')">Login</button>
</div>

<div id="userMenu" style="display:none;">
<button onclick="showPage('cadastro')">Cadastrar Produto</button>
<button onclick="showPage('listagem')">Listar Produtos</button>
<button onclick="logout()">Sair</button>
</div>
</aside>

<main class="content">

<section id="home" class="page">
<div class="header">
<h1>BEM-VINDO AO NOSSO SISTEMA!</h1>
<p>Fizemos este site com o CRUD e utilizamos HTML, CSS, Java Script e LocalStorage.</p>
</div>
</section>

<section id="login" class="page hidden">
<div class="card">
<h2>Login</h2>
<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">
<button class="btn primary" onclick="login()">Entrar</button>

<hr>

<h3>Criar Usuário</h3>
<input id="newUser" placeholder="Usuário">
<input id="newPass" type="password" placeholder="Senha">
<button class="btn primary" onclick="registerUser()">Cadastrar</button>
</div>
</section>

<section id="cadastro" class="page hidden">
<div class="card">
<h2>Cadastro de Produto</h2>

<input type="hidden" id="id">

<label>Nome *</label>
<input id="nome">

<label>Preço *</label>
<input id="preco" type="number">

<label>Marca</label>
<input id="marca">

<label>Quantidade</label>
<input id="quantidade" type="number">

<label>Código de Barras</label>
<input id="codigo">

<label>URL da Imagem</label>
<input id="imagem">

<button class="btn primary" onclick="saveProduct()">Salvar Produto</button>
</div>
</section>

<section id="listagem" class="page hidden">

<div class="dashboard">
<div class="info">
<h2 id="totalProdutos">0</h2>
<p>Produtos</p>
</div>
</div>

<div class="card">
<button class="btn primary" onclick="showPage('cadastro')">Novo Produto</button>

<input id="search" placeholder="Pesquisar por nome, marca ou código" onkeyup="renderProducts()">

<table>
<thead>
<tr>
<th>Imagem</th>
<th>Nome</th>
<th>Preço</th>
<th>Marca</th>
<th>Quantidade</th>
<th>Código</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</section>

</main>
</div>

<script src="script.js"></script>
</body>
</html>
